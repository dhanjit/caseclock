<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1120" />
    <meta name="color-scheme" content="dark light" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <!-- iOS home-screen icon MUST be a PNG (Safari ignores SVG apple-touch-icons
         → blank icon). 180×180 is the iPad/iPhone home-screen size; iOS applies
         its own rounded mask, so the source is a full-bleed square. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Home-screen label under the icon on iOS. -->
    <meta name="apple-mobile-web-app-title" content="CaseClock" />
    <!-- black-translucent = content runs under the status bar (edge-to-edge);
         the app shell pads itself with env(safe-area-inset-*) (see index.css). -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>CaseClock</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Portal target for the briefing-note print view (§8). Hidden until a note is
         open; @media print (see index.css) hides #root and reveals this as clean A4. -->
    <div id="print-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
